<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미래내일 일경험 운영관리 · 데모</title>
<style>* { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --bg:#eef1f6; --panel:#ffffff; --panel2:#f3f5f9; --line:#d3dae5; --line2:#e2e7ef;
    --txt:#15202e; --mut:#51607a; --mut2:#8893a8;
    --acc:#1f5bbf; --acc-bg:#e8eff8; --ai:#5b4abf; --ai-bg:#ece9f8;
    --red:#c5303c; --red-bg:#fbeaec; --amber:#b06a00; --amber-bg:#fbf1e0;
    --green:#0d7a55; --green-bg:#e7f3ee; --rule:#1565b3;
    --r:3px;
  }
  body{ background:var(--bg); color:var(--txt); font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif; font-size:14px; -webkit-font-smoothing:antialiased; }
  .app{ display:grid; grid-template-columns:218px 1fr; min-height:100vh; }
  /* sidebar */
  .side{ background:#1b2435; border-right:1px solid #243149; padding:0; position:sticky; top:0; height:100vh; }
  .brand{ font-weight:700; font-size:14.5px; letter-spacing:-.2px; line-height:1.4; color:#fff; padding:18px 16px; border-bottom:1px solid #2b3a55; }
  .brand small{ display:block; color:#8b99b5; font-weight:400; font-size:11px; margin-top:4px; }
  .nav{ padding:12px 10px; display:flex; flex-direction:column; gap:1px; }
  .nav a{ display:flex; align-items:center; gap:9px; padding:10px 12px; border-radius:var(--r); color:#b6c0d4; cursor:pointer; font-weight:500; font-size:13px; border-left:3px solid transparent; }
  .nav a:hover{ background:#222d42; color:#fff; }
  .nav a.on{ background:#243149; color:#fff; border-left-color:#4d86e6; font-weight:700; }
  .nav .ic{ width:16px; text-align:center; }
  .side-foot{ position:absolute; bottom:0; left:0; right:0; font-size:11px; color:#7d89a3; line-height:1.6; padding:14px 16px; border-top:1px solid #2b3a55; }
  .side-foot b{ color:#aab4c9; }
  /* topbar */
  .main{ display:flex; flex-direction:column; }
  .top{ display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-bottom:2px solid var(--acc); background:#fff; position:sticky; top:0; z-index:20; }
  .top h1{ font-size:16px; font-weight:700; letter-spacing:-.2px; }
  .top .sub{ color:var(--mut2); font-size:12px; margin-top:2px; }
  .top-r{ display:flex; align-items:center; gap:10px; }
  #apiKey{ width:240px; padding:7px 10px; border:1px solid var(--line); border-radius:5px; font-size:12px; background:var(--panel2); }
  #apiKey:focus{ outline:none; border-color:var(--acc); background:#fff; }
  .ai-mode{ font-size:11px; font-weight:800; color:var(--mut); white-space:nowrap; }
  .btn{ background:#fff; border:1px solid var(--line); color:var(--txt); padding:7px 13px; border-radius:var(--r); cursor:pointer; font-size:12.5px; font-weight:600; }
  .btn:hover{ border-color:var(--acc); background:var(--acc-bg); }
  .btn.ai{ background:var(--ai-bg); border-color:#cabfff; color:#473a9e; }
  .btn.pri{ background:var(--acc); border-color:var(--acc); color:#fff; }
  .btn.pri:hover{ background:#1a4ea3; }
  .btn.on{ background:var(--acc); border-color:var(--acc); color:#fff; }
  .btn.sm{ padding:5px 10px; font-size:11.5px; }
  .content{ padding:22px 24px 60px; max-width:1280px; }
  /* headline */
  .headline{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .money{ background:#fff; border:1px solid var(--line); border-left-width:4px; border-radius:var(--r); padding:16px 18px; }
  .money.risk{ border-left-color:var(--red); }
  .money.save{ border-left-color:var(--green); }
  .money .lab{ font-size:12.5px; color:var(--mut); font-weight:600; display:flex; align-items:center; gap:6px; }
  .money .val{ font-size:32px; font-weight:800; letter-spacing:-1px; margin-top:6px; font-variant-numeric:tabular-nums; }
  .money.risk .val{ color:var(--red); } .money.save .val{ color:var(--green); }
  .money .desc{ font-size:11.5px; color:var(--mut); margin-top:6px; }
  .money .formula{ display:none; font-size:11px; color:var(--mut); margin-top:10px; padding:10px 12px; background:var(--panel2); border:1px solid var(--line2); border-radius:var(--r); line-height:1.5; }
  .money .formula.show{ display:block; }
  .qmark{ display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:50%; border:1px solid var(--mut2); color:var(--mut2); font-size:10px; font-weight:800; cursor:pointer; background:#fff; margin-left:5px; vertical-align:middle; padding:0; }
  .qmark:hover{ border-color:var(--acc); color:var(--acc); }
  /* summary cards */
  .cards{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:22px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:14px 16px; }
  .card .n{ font-size:24px; font-weight:800; letter-spacing:-.5px; font-variant-numeric:tabular-nums; }
  .card .t{ font-size:12px; color:var(--mut); margin-top:3px; font-weight:600; }
  .card .x{ font-size:10.5px; color:var(--mut2); margin-top:5px; }
  .sec-h{ display:flex; align-items:center; justify-content:space-between; margin:6px 0 11px; padding-bottom:8px; border-bottom:1px solid var(--line); }
  .sec-h h2{ font-size:14.5px; font-weight:700; letter-spacing:-.2px; }
  .sec-h .hint{ font-size:11.5px; color:var(--mut2); }
  /* queue */
  .queue{ display:flex; flex-direction:column; gap:6px; }
  .qcard{ background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:13px 16px; display:grid; grid-template-columns:38px 1.7fr 1.9fr 150px 96px; gap:18px; align-items:center; cursor:pointer; transition:background .1s; }
  .qcard.top{ border-left:4px solid var(--acc); background:rgba(31,91,191,.05); }
  .qcard.top:hover{ background:rgba(31,91,191,.09); border-color:var(--acc); }
  .qcard:hover{ background:var(--acc-bg); border-color:var(--acc); }
  .qrank{ display:flex; align-items:center; justify-content:center; }
  .qrank span{ display:flex; align-items:center; justify-content:center; width:32px; height:32px; flex-shrink:0; background:#F1F3F5; border-radius:8px; color:var(--mut); font-size:14px; font-weight:800; font-variant-numeric:tabular-nums; }
  .qid .idname{ font-size:14.5px; }
  .qbirth{ font-size:11.5px; color:var(--mut2); margin-top:3px; font-variant-numeric:tabular-nums; }
  .qprog{ margin-top:7px; }
  .qreason{ font-size:13px; color:var(--txt); line-height:1.5; font-weight:500; }
  .qreason .hl{ color:var(--red); font-weight:700; }
  .queue.qc-on .qcard{ grid-template-columns:38px 1.5fr 1.6fr 138px 150px 96px; }
  .qcc{ display:flex; align-items:center; }
  .qcontact{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .qcc .qcontact{ flex-direction:column; gap:4px; align-items:flex-start; }
  .qfilt-grp{ display:flex; align-items:center; gap:8px; }
  .phone{ font-size:11.5px; font-weight:600; color:var(--mut); background:var(--panel2); border:1px solid var(--line); padding:4px 10px; border-radius:2px; font-variant-numeric:tabular-nums; }
  .phone.sub{ color:var(--mut2); font-weight:500; }
  .phone.off{ color:var(--mut2); background:transparent; border-style:dashed; font-weight:500; }
  .qpay{ text-align:right; font-variant-numeric:tabular-nums; }
  .qpay .p{ font-weight:700; font-size:13.5px; }
  .qpay .d{ font-size:11.5px; font-weight:700; margin-top:2px; }
  .neg{ color:var(--red); } .pos{ color:var(--green); }
  .qmeta{ display:flex; flex-direction:column; gap:5px; align-items:flex-end; }
  .badge{ font-size:10.5px; font-weight:700; padding:3px 7px; border-radius:2px; }
  .dday{ background:var(--amber-bg); color:var(--amber); border:1px solid #ecd9b0; } .dday.urgent{ background:var(--red-bg); color:var(--red); border-color:#eec4c8; }
  .dday.past{ background:var(--panel2); color:var(--mut2); border:1px solid var(--line); }
  .stat{ font-size:10px; font-weight:700; padding:3px 8px; border-radius:2px; border:1px solid transparent; }
  .s-untouched{ background:var(--panel2); color:var(--mut); border-color:var(--line); }
  .s-progress{ background:var(--acc-bg); color:#1a4ea3; border-color:#c2d4f0; }
  .s-hold{ background:var(--amber-bg); color:var(--amber); border-color:#ecd9b0; }
  .s-done{ background:var(--green-bg); color:var(--green); border-color:#bfe0d2; }
  .risk-pill{ display:inline-block; font-size:10.5px; font-weight:800; padding:2px 7px; border-radius:2px; font-variant-numeric:tabular-nums; }
  .rg-h{ background:var(--red-bg); color:var(--red); } .rg-m{ background:var(--amber-bg); color:var(--amber); } .rg-l{ background:var(--panel2); color:var(--mut); }
  /* list */
  .filters{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
  .filters input,.filters select{ background:#fff; border:1px solid var(--line); color:var(--txt); padding:8px 11px; border-radius:var(--r); font-size:12.5px; }
  .filters input{ width:180px; }
  .filters input:focus,.filters select:focus{ outline:none; border-color:var(--acc); }
  .listcount{ font-size:12px; color:var(--mut2); margin-bottom:9px; font-weight:600; }
  /* 참여자 리스트 = div 기반 CSS Grid (헤더·행이 동일 grid-template-columns 공유 → 어긋남 없음) */
  .lgrid{ background:#fff; border:1px solid var(--line); border-radius:var(--r); overflow:hidden; }
  .lrow{ display:grid; grid-template-columns:40px 1.6fr 1.4fr 1.15fr 0.8fr 0.8fr 1.15fr 1fr 0.95fr 0.6fr 0.72fr; align-items:center; border-bottom:1px solid var(--line2); }
  .lrow > div{ padding:9px 10px; font-size:12.5px; overflow:hidden; min-width:0; }
  .lrow.lhead{ background:#e9edf3; border-bottom:2px solid var(--line); }
  .lrow.lhead > div{ font-weight:700; color:var(--mut); font-size:11.5px; line-height:1.3; }
  .lrow:not(.lhead){ cursor:pointer; }
  .lrow:not(.lhead):hover{ background:var(--acc-bg); }
  .lgrid #lbody .lrow:last-child{ border-bottom:none; }
  .lrow .ctr{ text-align:center; }
  .lrow .idname{ white-space:nowrap; }
  .qrate{ font-size:11.5px; color:var(--mut); margin-top:5px; font-variant-numeric:tabular-nums; }
  .qrate b{ color:var(--txt); }
  /* 큐 컨트롤 바: 정렬(세그먼트 토글) 왼쪽 / 필터(독립 버튼) 오른쪽 */
  .qbar{ display:flex; align-items:center; justify-content:space-between; margin:4px 0 12px; }
  .qsort-grp{ display:flex; align-items:center; gap:9px; }
  .qsort-lbl{ font-size:12px; font-weight:700; color:var(--mut); }
  .seg-grp{ display:inline-flex; background:var(--panel2); border-radius:8px; padding:3px; gap:2px; }
  .seg{ border:none; background:transparent; color:var(--mut2); font-size:12px; font-weight:600; padding:5px 13px; border-radius:6px; cursor:pointer; font-variant-numeric:tabular-nums; }
  .seg:hover{ color:var(--acc); }
  .seg.on{ background:var(--acc-bg); color:var(--acc); font-weight:800; }
  .filt-btn{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:6px 13px; border-radius:7px; border:1px solid var(--line); background:#fff; color:var(--mut); cursor:pointer; }
  .filt-btn:hover{ border-color:var(--amber); }
  .filt-btn.on{ background:var(--amber-bg); border-color:#ecd9b0; color:var(--amber); font-weight:700; }
  .filt-btn svg{ flex-shrink:0; }
  .rtxt{ font-size:12.5px; color:var(--mut); }
  /* 주차별 출석 시간 표 */
  .wtbl{ width:100%; border:1px solid var(--line); border-collapse:collapse; }
  .wtbl th,.wtbl td{ padding:6px 10px; font-size:12px; border-bottom:1px solid var(--line2); text-align:right; font-variant-numeric:tabular-nums; }
  .wtbl th{ background:var(--panel2); color:var(--mut); font-weight:700; font-size:11px; }
  .wtbl th:first-child,.wtbl td:first-child{ text-align:left; color:var(--mut); font-weight:700; }
  .wtbl tr:last-child td{ border-bottom:none; }
  .wtbl .wtp{ color:var(--mut2); font-size:10.5px; margin-left:3px; }
  .wedit{ border-color:var(--ai); }
  .wein{ width:52px; padding:3px 6px; border:1px solid var(--ai); border-radius:3px; text-align:right; font-weight:800; color:var(--ai); font-variant-numeric:tabular-nums; }
  .wein:focus{ outline:none; box-shadow:0 0 0 2px rgba(124,77,255,.15); }
  /* 상세 패널 하단 고정 액션 바 */
  .pfoot{ position:sticky; bottom:0; background:#fff; border-top:1px solid var(--line); padding:11px 22px; display:flex; gap:8px; z-index:8; box-shadow:0 -3px 10px rgba(20,30,60,.07); }
  .pfoot .btn{ flex:1; text-align:center; padding:11px 8px; }
  /* 출석시간 수정 모드: 해당 블록만 활성, 나머지 비활성 */
  .panel.editing .block:not(.wk-block){ opacity:.4; pointer-events:none; }
  .panel.editing .wk-block{ box-shadow:0 0 0 2px var(--ai); border-color:var(--ai); }
  /* 연락 캘린더 + 기록 */
  .ccal{ display:grid; grid-template-columns:220px 1fr; gap:14px; }
  .cal{ border:1px solid var(--line); border-radius:var(--r); padding:10px; }
  .cal-top{ font-size:12px; font-weight:800; color:var(--txt); text-align:center; margin-bottom:8px; }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
  .cal-w{ font-size:10px; font-weight:700; color:var(--mut2); text-align:center; padding:2px 0; }
  .cal-d{ font-size:11px; text-align:center; padding:4px 0; border-radius:4px; color:var(--mut); position:relative; font-variant-numeric:tabular-nums; }
  .cal-d.emp{ visibility:hidden; }
  .cal-d.has{ background:var(--green-bg); color:var(--green); font-weight:800; }
  .cal-d.today{ outline:2px solid var(--acc); color:var(--acc); font-weight:800; }
  .cal-d.clk{ cursor:pointer; }
  .cal-d.clk:hover{ background:var(--ai-bg); color:var(--ai); font-weight:800; }
  .cal-d.sel{ background:var(--acc); color:#fff; font-weight:800; }
  .cal-d.sel.has{ background:var(--acc); color:#fff; }
  .clog{ }
  .clog-h{ font-size:11.5px; font-weight:700; color:var(--mut); margin-bottom:8px; }
  .clog-i{ font-size:12.5px; padding:6px 0; border-bottom:1px dashed var(--line2); display:flex; gap:8px; }
  .clog-i b{ color:var(--green); flex-shrink:0; font-variant-numeric:tabular-nums; }
  .clog-i{ border-radius:4px; padding-left:4px; padding-right:4px; align-items:center; }
  .clog-i:hover{ background:var(--panel2); }
  .cmemo{ flex:1; }
  .cacts{ display:flex; gap:2px; margin-left:auto; flex-shrink:0; }
  .cbtn{ border:none; background:transparent; cursor:pointer; font-size:12.5px; color:var(--mut2); width:24px; height:24px; border-radius:4px; line-height:1; padding:0; }
  .cbtn:hover{ background:#fff; color:var(--acc); box-shadow:0 0 0 1px var(--line); }
  .cbtn.del:hover{ color:var(--red); }
  .cbtn.save{ color:var(--green); font-weight:800; }
  .cedit-in{ flex:1; border:1px solid var(--acc); border-radius:3px; padding:4px 7px; font-size:12.5px; }
  .cedit-in:focus{ outline:none; }
  .cadd{ display:flex; gap:6px; margin-top:10px; align-items:center; }
  .cadd-d{ font-size:11.5px; font-weight:800; color:var(--acc); white-space:nowrap; padding:0 4px; }
  .cadd select{ border:1px solid var(--line); border-radius:var(--r); padding:7px 9px; font-size:12px; background:#fff; color:var(--txt); }
  .cadd input{ flex:1; border:1px solid var(--line); border-radius:var(--r); padding:7px 10px; font-size:12.5px; }
  .cadd input:focus,.cadd select:focus{ outline:none; border-color:var(--acc); }
  .cadd .btn{ white-space:nowrap; }
  .ai-prompt{ background:#fff; border:1px solid #cabfff; border-radius:var(--r); padding:9px 11px; font-size:12.5px; line-height:1.5; color:var(--txt); width:100%; resize:vertical; min-height:48px; font-family:inherit; }
  .ai-prompt:focus{ outline:none; border-color:var(--ai); }
  .wf-max{ display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--acc); margin:10px 0 4px; cursor:pointer; }
  .wf-max input{ accent-color:var(--acc); cursor:pointer; }
  .wf-weeks{ display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
  .wk-in{ display:flex; align-items:center; gap:4px; font-size:11.5px; color:var(--mut); }
  .wk-in label{ font-weight:700; min-width:24px; }
  .wk-in input{ width:46px; padding:4px 6px; border:1px solid var(--line); border-radius:4px; font-size:12.5px; font-weight:700; text-align:right; color:var(--acc); font-variant-numeric:tabular-nums; }
  .wk-in input:focus{ outline:none; border-color:var(--acc); }
  .wk-tot{ color:var(--mut2); }
  .toggle{ display:flex; align-items:center; gap:7px; font-size:12.5px; color:var(--mut); cursor:pointer; user-select:none; }
  .sw{ width:34px; height:19px; background:var(--line); border-radius:20px; position:relative; transition:.15s; flex-shrink:0; }
  .sw.on{ background:var(--acc); }
  .sw::after{ content:''; position:absolute; width:15px; height:15px; background:#fff; border-radius:50%; top:2px; left:2px; transition:.15s; }
  .sw.on::after{ left:17px; }
  .sw-doc.on{ background:var(--green); }
  .linkbtn{ background:none; border:none; color:var(--acc); font-size:11px; font-weight:700; cursor:pointer; padding:0; }
  .bandref{ margin-top:6px; }
  .bandtbl{ width:100%; border:1px solid var(--line); }
  .bandtbl th,.bandtbl td{ padding:6px 11px; font-size:12px; border-bottom:1px solid var(--line2); text-align:right; font-variant-numeric:tabular-nums; }
  .bandtbl th:first-child,.bandtbl td:first-child{ text-align:left; color:var(--mut); }
  .bandtbl th{ background:var(--panel2); color:var(--mut); font-weight:700; font-size:11px; }
  .bandtbl td.cur{ background:var(--acc-bg); color:var(--acc); font-weight:800; }
  .bandtbl tr:last-child td{ border-bottom:none; }
  .doc-chip{ font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:2px; border:1px solid transparent; }
  .doc-chip.miss{ background:var(--amber-bg); color:var(--amber); border-color:#ecd9b0; }
  .doc-chip.ok{ background:var(--panel2); color:var(--mut2); border-color:var(--line); }
  .docwarn{ color:var(--amber); font-weight:700; }
  .fb{ font-size:10.5px; font-weight:800; padding:2px 8px; border-radius:2px; border:1px solid transparent; }
  .fb-act{ background:var(--amber-bg); color:var(--amber); border-color:#ecd9b0; }
  .fb-fail{ background:var(--panel2); color:var(--mut2); border-color:var(--line); }
  .fb-safe{ background:var(--green-bg); color:var(--green); border-color:#bfe0d2; }
  .manje-sum{ margin-top:11px; font-size:12.5px; line-height:1.55; color:var(--mut); background:var(--panel2); border:1px solid var(--line); border-radius:var(--r); padding:11px 13px; }
  .pchip{ display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; min-width:22px; height:19px; padding:0 6px; border-radius:11px; }
  .pchip.p1{ background:#e2f5ef; color:#0b7a5c; border:1px solid #bfe0d2; }
  .pchip.p2{ background:#ece9f8; color:#5b4abf; border:1px solid #d6cdf3; }
  .wkchip{ font-size:12px; font-weight:700; color:var(--acc); }
  .wkchip-sm{ font-size:11.5px; font-weight:700; color:var(--acc); margin-left:5px; }
  .ttag{ font-size:10px; font-weight:800; padding:2px 7px; border-radius:2px; }
  .ttag.neg{ background:var(--red-bg); color:var(--red); } .ttag.pos{ background:var(--green-bg); color:var(--green); } .ttag.mut{ background:var(--panel2); color:var(--mut2); }
  .doc-edit{ font-size:10.5px; color:var(--mut2); font-weight:600; }
  .doc-ctrl{ cursor:pointer; display:inline-flex; align-items:center; gap:5px; }
  .doc-ctrl:hover .doc-edit{ color:var(--acc); }
  .wf-next{ font-size:11px; color:var(--mut); margin-top:8px; padding:9px 11px; background:var(--acc-bg); border-radius:var(--r); }
  .ladder-title{ font-size:10.5px; color:var(--mut2); font-weight:700; margin-bottom:4px; }
  .ladder-row{ display:flex; justify-content:space-between; font-size:11.5px; padding:3px 0; color:var(--mut); font-variant-numeric:tabular-nums; }
  .ladder-row b{ color:var(--acc); } .ladder-row span:last-child{ color:var(--green); font-weight:600; }

const PAY = {
  jt: [[0.90,150000],[0.70,131250],[0.60,112500],[0.50,93750],[0,0]],
  we: [[0.90,300000],[0.70,262500],[0.60,225000],[0.50,187500],[0,0]]
};
const BLABEL = ['90%+','70-90%','60-70%','50-60%','<50% 미지급'];
const THR = [0.90,0.70,0.60,0.50];
const FULL = PAY.jt[0][1] + PAY.we[0][1]; // 만점 총수당 450,000

function tierOf(r){ for(let i=0;i<THR.length;i++){ if(r>=THR[i]) return i; } return 4; }
function payOf(r,k){ return PAY[k][tierOf(r)][1]; }
function bandOf(r){ return BLABEL[tierOf(r)]; }
const won = n => (n<0?'-':'')+'₩'+Math.abs(Math.round(n)).toLocaleString('ko-KR');
const pct = r => r==null?'—':Math.round(r*100)+'%';
// 현재 출석률 셀: P2가 막 시작돼 현재 기간 데이터가 없으면(—) 지난 P1 출석률을 병기.
// 지난 기간이 미지급(<50%)이면 빨간색(출석 장려 필요), 아니면 회색.
function curRate(p, k){
  const c = p[k==='jt'?'jc':'wc'];
  if(c.cur!=null) return pct(c.cur);
  const past = fullRate(p,k,0,3);
  const col = past<0.50 ? 'var(--red)' : 'var(--mut2)';
  return `<span style="color:${col}">—<small style="font-weight:500;margin-left:2px">지난 ${pct(past)}</small></span>`;
}

function pgLabel(pg){ const {name,code}=pgParts(pg); const we=name.includes('일경험'); return `<span class="pglabel ${we?'we':'jt'}">${name}</span>${code?`<span class="pgcode">${code}</span>`:''}`; }
function gchip(g){ return `<span class="gtxt">(${g})</span>`; }

const hrs = (a,t)=>`<span class="hours"><b>${a}</b><span class="u">/${t}h</span></span>`;

// ===== 현재 주차(기준 시점): 프로그램(코호트)별로 다름 =====
const PROGS = [...new Set(DATA.map(d=>d.pg))].sort();
const CW = {}; PROGS.forEach((p,i)=>{ CW[p] = 2 + (i*3 % 7); }); // 2~8주차 분산(최소 1주 이력 확보)

// 종료까지 남은 주: 8주 일정 기준. 0 = 마지막주
function weeksLeft(p){ return 8 - p.cw; }
function ddayBadge(p){
  const wl=weeksLeft(p);
  return `<span class="badge dday">${wl<=0?'마지막주':'종료 D-'+wl+'주'}</span>`;
}

// ===== 만회 계산: 수당은 4주 기간(P1:1~4주 / P2:5~8주)별 정산. 현재 주차가 속한 기간을 기준으로 만회 판단 =====
function curPeriod(cw){ return cw<=4 ? [0,3,'1~4주'] : [4,7,'5~8주']; }
function fullRate(p,k,s,e){ let a=0,t=0; for(let i=s;i<=e;i++){a+=p[k+'_w'][i];t+=p[k+'_wt'][i];} return t?a/t:0; }
function periodConf(p,k,s,e){ let a=0,t=0; for(let i=s;i<=e;i++){ if(i<=p.cw-2){a+=p[k+'_w'][i];t+=p[k+'_wt'][i];} } return t?a/t:null; } // 현재 주차 이전(확정)만
function kcalc(p,k){
  const cw=p.cw, att=p[k+'_w'], tot=p[k+'_wt'];
  const [s,e,plabel]=curPeriod(cw);
  let cAtt=0,cTot=0,remTot=0,pTot=0;
  for(let i=s;i<=e;i++){
    pTot+=tot[i];
    if(i<=cw-2){ cAtt+=att[i]; cTot+=tot[i]; } else remTot+=tot[i]; // 현재 주차 이전=확정 / 이후=남은
  }
  const cur=cTot>0?cAtt/cTot:null, max=pTot?(cAtt+remTot)/pTot:0, min=pTot?cAtt/pTot:0;
  return {cw,plabel,cAtt,cTot,remTot,pTot,cur,max,min};
}

// 참여자 파생값 계산 (출석 시간 수정 시 재호출해 재계산)
function derive(p){
  p.p2stage = p.cw>4;
  p.jc = kcalc(p,'jt'); p.wc = kcalc(p,'we');
  p.settledPay = p.p2stage ? (payOf(fullRate(p,'jt',0,3),'jt')+payOf(fullRate(p,'we',0,3),'we')) : 0;
  const jExp = p.jc.cur!=null ? p.jc.cur : fullRate(p,'jt',0,3);
  const wExp = p.wc.cur!=null ? p.wc.cur : fullRate(p,'we',0,3);
  p.expPay = payOf(jExp,'jt') + payOf(wExp,'we');
  p.maxPay = payOf(p.jc.max,'jt') + payOf(p.wc.max,'we');
  p.minPay = payOf(p.jc.min,'jt') + payOf(p.wc.min,'we');
  p.swing = Math.max(0, p.maxPay - p.expPay); // 개입가치 = 최대 출석 시 − 현재 출석률 유지 시
  const failBoth = p.jc.max < 0.50 && p.wc.max < 0.50;
  const bothTop = (p.jc.cur!=null&&p.jc.cur>=0.90) && (p.wc.cur!=null&&p.wc.cur>=0.90);
  p.feasib = failBoth ? '만회불가' : (bothTop ? '안전' : '결정적');
  p.actionable = (p.feasib==='결정적') || (p.doc==='미비' && p.feasib!=='만회불가');
}
DATA.forEach(p=>{
  p.cw = CW[p.pg];
  p.p2stage = p.cw>4;
  if(p.p2stage) p.doc='완료'; // P2단계는 P1 정산 시 서류 완비됨
  derive(p);
  p.status = 'untouched';
  // 연락 기록 더미 시드 (일부 참여자)
  p.contacts = [];
  if(p.id%4===1) p.contacts.push({d:11+(p.id%7), memo:'출석 독려 문자 발송'});
  if(p.id%9===3) p.contacts.push({d:15+(p.id%4), memo:'전화 통화 — 출석 상황 점검'});
});

// 우선순위: 결정적 먼저 → 개입가치(swing) 큰 순 → 마감 임박 → 서류 미비 먼저
const FB_ORDER = {결정적:0,안전:1,만회불가:2}; // 만회불가는 맨 뒤
function prioritySort(a,b){
  return FB_ORDER[a.feasib]-FB_ORDER[b.feasib]
    || b.swing-a.swing
    || weeksLeft(a)-weeksLeft(b)
    || (b.doc==='미비')-(a.doc==='미비');
}

// 헤드라인 집계
const HEAD = {
  total: DATA.length,
  swingTotal: DATA.filter(p=>p.actionable).reduce((s,p)=>s+p.swing,0), // 개입으로 좌우되는 금액
  decisiveCnt: DATA.filter(p=>p.feasib==='결정적').length,
  failCnt: DATA.filter(p=>p.feasib==='만회불가').length,
  safeCnt: DATA.filter(p=>p.feasib==='안전').length,
  docMiss: DATA.filter(p=>p.doc==='미비').length,
  docHold: DATA.filter(p=>p.doc==='미비' && p.feasib!=='만회불가').reduce((s,p)=>s+p.expPay,0) // 서류로 막힌 금액
};

}

// ===== AI 생성 (사전 배치: 화면녹화용. 실서비스는 API) =====
function genAI(p, prompt){
  const nm=p.nm, cw=p.cw, wl=weeksLeft(p);
  const wkTxt = wl<=0?'마지막주':`종료까지 ${wl}주`;
  let summary, reason, msg, call, channel;
  if(p.feasib==='만회불가'){
    summary = `${nm} — 현재 ${cw}주차. 남은 출석을 모두 채워도 만회 상한이 직무훈련 ${pct(p.jc.max)}·일경험 ${pct(p.wc.max)}로 미지급선 미달. 수학적으로 회복 불가.`;
    reason = `남은 출석을 다 채워도 50% 미달 → 출석 독려로는 회복이 어려움. 면담 검토 대상.`;
    msg = `${nm}님, 안녕하세요. 현재 출석 상황을 함께 점검하고 향후 참여 계획을 논의하고자 연락드립니다. 편하실 때 면담 일정을 알려주시면 감사하겠습니다.`;
    call = `① 인사 — "안녕하세요 ${nm}님, 운영 담당자입니다. 잠시 통화 괜찮으세요?"\n② 상황 — 현재 출석으로는 이번 정산 기준을 맞추기 어려운 상황임을 차분히 안내\n③ 면담 제안 — "앞으로의 참여 계획을 함께 논의하고 싶어요. 편한 시간 알려주시겠어요?"\n④ 마무리 — 가능한 지원 방법을 함께 찾겠다고 안내`;
    channel = '직접 연락(면담)';
  } else if(p.doc==='미비' && p.feasib!=='결정적'){
    summary = `${nm} — 현재 ${cw}주차, 출결은 양호하나 서류 미비로 수당 지급 보류 상태. 출석과 무관하게 서류 완비 전까지 미지급.`;
    reason = `출석으로 해결되지 않는 행정 블로커. 서류 제출만 받으면 ${won(p.maxPay)} 지급 가능 → 서류 독촉이 1순위 조치.`;
    msg = `${nm}님, 안녕하세요. 출석은 잘 하고 계신데 제출 서류가 일부 누락되어 수당 지급이 보류되고 있어요. 서류만 보완하면 바로 처리되니 확인 부탁드립니다.`;
    call = `① 인사 — "안녕하세요 ${nm}님."\n② 핵심 — "출석은 잘 하고 계신데, 제출 서류가 일부 누락되어 수당 지급이 보류되고 있어요."\n③ 안내 — 필요한 서류와 제출 방법 설명\n④ 마무리 — "서류만 보완되면 바로 처리됩니다. 언제까지 제출 가능하실까요?"`;
    channel = '안내 문자';
  } else if(p.feasib==='결정적'){
    const remWk=remIdx(p).length, jc=p.jc, wc=p.wc;
    const nh=c=>{ const t=tierOf(c.max); return {band:BLABEL[t], need:Math.max(0, Math.ceil(THR[t]*c.pTot - c.cAtt))}; };
    const jn=nh(jc), wn=nh(wc);
    const rateP=(jc.cur!=null||wc.cur!=null)?`현재 출석률이 직무훈련 ${pct(jc.cur)}·일경험 ${pct(wc.cur)}인데, `:`이번 정산 기간이 막 시작됐는데, `;
    const guide=(jn.need===0&&wn.need===0)
      ? `남은 ${remWk}주 동안 지금처럼만 출석을 유지하시면 직무훈련 ${jn.band}·일경험 ${wn.band} 구간 수당을 지킬 수 있어요.`
      : `남은 ${remWk}주 동안 직무훈련 ${jn.need}h·일경험 ${wn.need}h 이상만 더 출석하시면 직무훈련 ${jn.band}·일경험 ${wn.band} 구간 수당을 지킬 수 있어요.`;
    summary = `${nm} — 현재 ${cw}주차(${wkTxt}). 현재 출석률 직무훈련 ${pct(jc.cur)}·일경험 ${pct(wc.cur)}. 남은 ${remWk}주 직무훈련 ${jn.need}h·일경험 ${wn.need}h 더 채우면 ${jn.band}/${wn.band} 도달.`;
    reason = `남은 출석으로 수당 구간이 바뀌는 출석 장려 대상 → 개입가치 ${won(p.swing)}. ${wkTxt}라 지금 독려해야 만회할 수 있어요.${p.doc==='미비'?' (서류 미비 동반 — 함께 안내)':''}`;
    msg = `${nm}님, 안녕하세요 운영 담당자입니다. ${rateP}${guide} 출석에 어려운 점이 있으면 편하게 말씀해 주세요.`;
    const callRate=(jc.cur!=null||wc.cur!=null)?`현재 출석률이 직무훈련 ${pct(jc.cur)}, 일경험 ${pct(wc.cur)} 정도예요.`:`이번 정산 기간이 막 시작된 시점이에요.`;
    call = `① 인사 — "안녕하세요 ${nm}님, 운영 담당자입니다. 잠깐 통화 괜찮으세요?"\n② 현황 — "${callRate}"\n③ 핵심 — "${guide.replace(/h/g,'시간')}"\n④ 경청 — "혹시 출석에 어려운 점이 있으신가요?" 어려움 청취\n⑤ 마무리 — 남은 기간 출석 독려 + 필요 시 지원 안내${p.doc==='미비'?'\n⑥ 서류 — 미제출 서류도 함께 안내':''}`;
    channel = (p.swing>=100000)?'직접 연락(전화)':'안내 문자';
  } else {
    summary = `${nm} — 현재 ${cw}주차. 남은 출석과 무관하게 수당 구간 확정(안전). 개입 불필요.`;
    reason = `이미 구간이 확정되어 개입으로 바뀌지 않음. 모니터링만.`;
    msg = `${nm}님, 안녕하세요. 참여 잘 이어가고 계신지 확인차 인사드립니다. 어려운 점 있으면 언제든 연락 주세요.`;
    call = `① 인사 — "안녕하세요 ${nm}님, 잘 지내시죠?"\n② 확인 — 참여 잘 이어가고 있는지 가볍게 확인\n③ 마무리 — "어려운 점 있으면 언제든 연락 주세요."`;
    channel = '안내 문자';
  }
  // 담당자 추가 지시(상황·톤) 반영 — 실서비스는 AI API 호출. 데모는 톤 인식 mock 재작성.
  if(prompt && prompt.trim()){
    const pt=prompt.trim();
    if(/따뜻|다정|친근|부드|격려|정겨/.test(pt)){
      msg = `${nm}님, 안녕하세요 :) 잘 지내고 계시죠? 운영 담당자예요. ` +
        msg.replace(/^[^.]*\.\s*/,'').replace(/(편하게 )?말씀해 주세요\.?\s*$/,'편하게 말씀해 주세요. 늘 응원하고 있을게요!').replace(/감사합니다\.?\s*$/,'언제든 편히 연락 주세요!');
      call = call.replace('잠깐 통화 괜찮으세요?','잠깐 통화 괜찮으세요? 목소리 들으니 반갑네요 :)').replace('어려움 청취','어려운 점을 따뜻하게 들어주기').replace('출석 독려','따뜻한 출석 응원');
    } else if(/정중|격식|공식/.test(pt)){
      msg = msg.replace(/안녕하세요[^.]*\./,'안녕하세요. 운영 담당자입니다.').replace(/(편하게 )?말씀해 주세요\.?\s*$/,'말씀해 주시면 감사하겠습니다.');
    } else if(/간결|짧/.test(pt)){
      msg = msg.replace(/안녕하세요[^.]*\.\s*/,`${nm}님, `).replace(/\s*출석에 어려운 점이 있으면 편하게 말씀해 주세요\.?\s*$/,'');
    } else {
      msg = msg.replace(/(감사합니다|응원하겠습니다!?|말씀해 주세요)\.?\s*$/,'').trim() + ` 더불어 ${pt} 관련 안내도 함께 드리겠습니다. 필요하시면 편하게 말씀해 주세요.`;
      call += `\n⑥ ${pt} — 관련 내용 함께 안내`;
    }
  }
  return {summary, reason, msg, call, channel};
}

function filtered(){
  let r=DATA.filter(p=>{
    if(LF.q && !p.nm.includes(LF.q)) return false;
    if(LF.type && !p.pg.includes(LF.type)) return false;
    if(LF.feasib && p.feasib!==LF.feasib) return false;
    if(LF.doc && p.doc!==LF.doc) return false;
    return true;
  });
  if(LF.sort==='priority') r.sort(prioritySort);
  else if(LF.sort==='swing') r.sort((a,b)=>b.swing-a.swing);
  else r.sort((a,b)=>b.cw-a.cw);
  return r;
}

// 만회 박스: 현재 출석률(확정) + 도달 가능 범위(하한~상한)
function manjeBox(label,k,p){
  const c=k==='jt'?p.jc:p.wc;
  const maxC=tierOf(c.max), minC=tierOf(c.min);
  const col=c.max>=0.9?'var(--green)':c.max>=0.7?'var(--amber)':'var(--red)';
  const locked = maxC===minC;
  return `<div class="kbox"><div class="kt">${label} · 현재 출석률</div>
    <div class="kr" style="color:${col}">${pct(c.cur)}</div>
    <div class="kd" style="color:var(--mut)">현재 ${c.cAtt}/${c.cTot}h · 남은 ${c.remTot}h</div>
    <div class="gauge" style="margin-top:9px">
      <div class="fill" style="width:${c.min*100}%;background:var(--mut2)"></div>
      <div class="fill" style="position:absolute;left:${c.min*100}%;width:${(c.max-c.min)*100}%;background:${col};opacity:.45"></div>
      ${THR.map(t=>`<span class="mark" style="left:${t*100}%"></span>`).join('')}
    </div>
    <div class="kd" style="margin-top:6px">도달 가능 구간: <b>${bandOf(c.max)}</b>${locked?' (확정)':` ~ ${bandOf(c.min)}`}</div>
    <div class="kd" style="color:var(--mut2);margin-top:2px">최대 ${won(payOf(c.max,k))} / 최소 ${won(payOf(c.min,k))}</div></div>`;
}
function manjeSummary(p){
  if(p.feasib==='만회불가') return `<b class="neg">만회 불가</b> — 남은 출석을 다 채워도 미지급선에 못 미쳐 출석 독려로는 회복이 어려워요.`;
  if(p.feasib==='안전') return `<b class="pos">안전</b> — 남은 출석과 상관없이 수당 구간이 정해져 있어 별도 개입은 필요 없어요.`;
  let s=`<b style="color:var(--amber)">출석 장려 대상</b> — 남은 출석을 채우면 <b>${won(p.maxPay)}</b>, 현재 출석률 유지 시 <b>${won(p.expPay)}</b>. 개입가치 <b class="pos">${won(p.swing)}</b>.`;
  if(p.doc==='미비') s+=` <span class="docwarn">서류 미비 — 지급 위해 서류도 필요.</span>`;

// 실시간 AI 호출 — 규칙 기반 초안(숫자·사실)은 유지하고, 운영자 지시(상황·톤)만 반영해 재작성.
// 경로: ① API 키 있으면 Anthropic API 직접 호출  ② 없으면 로컬 Claude 브리지(bridge.py)  ③ 실패 시 mock.
const BRIDGE_URL = 'http://localhost:8787';
function aiPrompt(p, instruction){
  const g = genAI(p); // 규칙이 만든 사실 초안(출석률·남은 주차·필요 시간·수당 구간)
  const sys = "너는 '미래내일 일경험' 사업의 운영 담당자다. 아래 '기준 초안'에 담긴 숫자와 사실(출석률, 남은 주차, 더 채울 시간, 수당 구간)은 절대 바꾸지 마라. 운영자의 추가 지시(참여자 상황·톤)를 자연스럽게 반영해 문자 안내(msg)와 전화 통화 스크립트(call)를 다시 써라. 전화 스크립트는 ①인사 ②현황 ③핵심(필요 시간·구간) ④경청 ⑤마무리 흐름을 유지한다. 정중하고 따뜻한 운영자 말투. 반드시 JSON만 출력: {\"msg\":\"...\",\"call\":\"...\"}";
  const user = `[기준 초안 · 문자]\n${g.msg}\n\n[기준 초안 · 전화]\n${g.call}\n\n[운영자 추가 지시]\n${instruction||'(없음 — 기본 톤 유지)'}\n\n위 지시를 반영하되 숫자·사실은 그대로 두고 msg와 call을 JSON으로 다시 작성해줘.`;
  return { g, sys, user };
}
function parseAI(text, g){ const j=text.match(/\{[\s\S]*\}/); if(!j) throw new Error('JSON 파싱 실패'); const m=JSON.parse(j[0]); return { msg:m.msg||g.msg, call:m.call||g.call, summary:g.summary, reason:g.reason }; }
async function callAnthropic(sys, user){
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'content-type':'application/json', 'x-api-key':APIKEY, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1200, system:sys, messages:[{role:'user',content:user}] })
  });
  if(!res.ok){ throw new Error('API HTTP '+res.status+' '+(await res.text()).slice(0,120)); }
  const data = await res.json();
  return (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
}
async function callBridge(sys, user){
  const res = await fetch(BRIDGE_URL, { method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({system:sys, user:user}) });
  if(!res.ok) throw new Error('브리지 HTTP '+res.status);
  return (await res.json()).text||'';
}
async function callClaude(p, instruction){
  const { g, sys, user } = aiPrompt(p, instruction);
  const text = APIKEY ? await callAnthropic(sys, user) : await callBridge(sys, user);
  return parseAI(text, g);
}

  CEDIT=-1; document.getElementById('ccalWrap').innerHTML=contactCal(CUR); toast('메모 수정됨'); }
function delContactAt(i){ if(!CUR) return; const c=CUR.contacts[i];
  if(c){ if(c.cid) LOGS=LOGS.filter(l=>l.cid!==c.cid); CUR.contacts.splice(i,1); } // 처리 내역에서도 삭제
  CEDIT=-1; document.getElementById('ccalWrap').innerHTML=contactCal(CUR); toast('기록 삭제됨 · 처리 내역 반영'); }
function closeDetail(){ document.getElementById('ov').classList.remove('show'); document.getElementById('panel').classList.remove('show'); CUR=null; }

// ===== 일괄 처리 =====
function openBatch(){
  const ids=[...BATCH]; const ps=DATA.filter(p=>ids.includes(p.id));
  const m=document.getElementById('modal');
  m.innerHTML=`<div class="mbox"><div class="mh"><h3>🤖 AI 일괄 문구 생성 · ${ps.length}명</h3><span class="x" style="cursor:pointer;color:var(--mut)" onclick="closeModal()">✕</span></div>
   <div class="mc">
     <div style="background:var(--ai-bg);border:1px solid #cabfff;border-radius:6px;padding:12px;margin-bottom:16px;font-size:12.5px;color:#473a9e">
       AI가 <b>각자 맥락(이름·현재 주차·남은·개입가치)</b>에 맞춰 개별 문구를 동시 생성했습니다. 단건 ${ps.length}회 반복 대신 한 번에 검토·발송하는 스케일 동선입니다.
     </div>
     <div id="bcards"><div class="empty"><span class="spin"></span> AI가 ${ps.length}명 개별 문구 생성 중…</div></div>
   </div></div>`;
  m.classList.add('show');
  setTimeout(()=>{
    document.getElementById('bcards').innerHTML=ps.map(p=>{ const g=genAI(p); return `<div class="bcard">
      <div class="bn">${p.nm} ${gchip(p.gd)} ${pgLabel(p.pg)} <span style="color:var(--mut2);font-weight:500;font-size:11px">· 현재 ${p.cw}주차 · 개입가치 ${won(p.swing)}</span></div>
      <textarea class="ai-msg" style="min-height:62px">${g.msg}</textarea></div>`; }).join('')
      + `<div class="actions" style="margin-top:6px"><button class="btn pri" onclick="sendBatch(${ps.length})">일괄 검토 완료 · ${ps.length}건 발송 (mock)</button></div>`;
  },1100);
}
function sendBatch(n){
  [...BATCH].forEach(id=>{ const p=DATA.find(x=>x.id===id); const g=genAI(p); if(p.status==='untouched') p.status='contacted';
    LOGS.unshift({t:nowStr(),id:p.id,nm:p.nm,type:'출석독려(일괄)',ai:g.msg,final:g.msg,result:'contacted',reason:'',summary:g.summary}); });
  BATCH.clear(); closeModal(); toast(`📨 ${n}건 일괄 발송 완료 · 로그 기록됨`); go(CURVIEW);
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

// ===== 로그 =====
function renderLogs(){
  const v=document.getElementById('view');
  if(!LOGS.length){ v.innerHTML=`<div class="empty">아직 확정된 조치가 없습니다.<br>대시보드 큐 또는 리스트에서 조치를 확정하면 여기에 기록됩니다.</div>`; return; }
  v.innerHTML=`<div class="sec-h"><h2>처리 내역 · ${LOGS.length}건</h2><div class="hint">연락·정산확정 처리 이력</div></div>
   <table><thead><tr><th>시각</th><th>참여자</th><th>조치</th><th>결과</th></tr></thead><tbody>
   ${LOGS.map(l=>`<tr style="cursor:pointer" onclick="openDetail(${l.id})"><td style="color:var(--mut2)">${l.t}</td><td><b>${l.nm}</b></td><td>${l.type}</td>
     <td>${({paid:'<span class="pos">확정완료</span>',contacted:'<span style="color:#2b5fd0">연락완료</span>',hold:'<span style="color:var(--amber)">보류</span>'})[l.result]||l.result}</td></tr>`).join('')}
   </tbody></table>
   <div style="margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:6px;padding:14px;font-size:12.5px;color:var(--mut)">
     처리 요약 — 확정완료 ${LOGS.filter(l=>l.result==='paid').length} · 연락완료 ${LOGS.filter(l=>l.result==='contacted').length} · 보류 ${LOGS.filter(l=>l.result==='hold').length}
   </div>`;
}

// ===== 멘토 그룹 =====
function renderMentors(){
  const v=document.getElementById('view');
  const groups={};
  DATA.forEach(p=>{ (groups[p.pg]=groups[p.pg]||[]).push(p); });
  v.innerHTML=`<div class="sec-h"><h2>멘토 그룹 뷰</h2></div>
   <div class="grp">${Object.entries(groups).map(([pg,ps])=>{
     const act=ps.filter(p=>p.actionable).length; const cw=ps[0].cw;
     return `<div class="gcard"><div class="gn">${pgLabel(pg)} <span class="fb ${act?'fb-act':'fb-safe'}">처리 대상 ${act}</span></div>
       <div class="gx">담당 ${ps.length}명 · 현재 ${cw}주차 (${weeksLeft(ps[0])<=0?'마지막주':'종료 D-'+weeksLeft(ps[0])+'주'})</div>
       <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:5px">${ps.filter(p=>p.actionable).slice(0,6).map(p=>`<span class="mband" style="cursor:pointer" onclick="openDetail(${p.id})">${p.nm} ${gchip(p.gd)} ${won(p.swing)}</span>`).join('')||'<span style="color:var(--mut2);font-size:12px">처리 대상 없음</span>'}</div></div>`;
   }).join('')}</div>`;
}

// ===== 유틸 =====
let _t=0; function nowStr(){ _t++; const mm=String(9+Math.floor(_t/6)).padStart(2,'0'); const ss=String((_t*10)%60).padStart(2,'0'); return `오늘 ${mm}:${ss}`; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._); t._=setTimeout(()=>t.classList.remove('show'),2400); }

go('dash');

</script>
</body>
</html>
